<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Escudo Digital</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

textarea {
  width: 100%;
  height: 120px;
  border-radius: 10px;
  padding: 10px;
  font-size: 16px;
}

button {
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #3aa6b9;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.exemplos button {
  margin: 5px;
  background: #6ec1e4;
}

#resultado {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
}

#barraContainer {
  background: #ddd;
  border-radius: 10px;
  margin-top: 10px;
}

#barra {
  height: 20px;
  border-radius: 10px;
  width: 0%;
}

#dicas {
  display: none;
  margin-top: 10px;
  background: #fff3cd;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🔰 Escudo Digital</h2>

<p><b>Cole a mensagem:</b></p>
<textarea id="mensagem"></textarea>

<button onclick="analisar()">🔍 Analisar</button>

<div id="barraContainer">
  <div id="barra"></div>
</div>

<div id="resultado"></div>

<h3>Exemplos de golpes</h3>
<div class="exemplos">
<button onclick="exemplo('premio')">🎁 Golpe de premiação</button>
<button onclick="exemplo('banco')">🏦 Golpe bancário</button>
<button onclick="exemplo('fake')">📢 Fake news</button>
</div>

<br>
<button onclick="toggleDicas()">💡 Ver dicas de segurança</button>

<div id="dicas">
Não clique em links desconhecidos.<br>
Nunca envie códigos ou senhas.<br>
Desconfie de urgência.<br>
Confirme sempre com fontes oficiais.
</div>

</div>

<script>

function normalizar(txt) {
  return txt.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function aleatorio(lista) {
  return lista[Math.floor(Math.random() * lista.length)];
}

function analisar() {

let texto = normalizar(document.getElementById("mensagem").value);

let score = 0;
let resultado = "";

// função base
function detectar(regex, pontos, msg) {
  let match = texto.match(regex);
  if (match) {
    score += pontos * match.length;
    resultado += msg + " (" + match.length + "x)<br>";
  }
}

// 🔴 ALTO RISCO
detectar(/pix|senha|codigo|cartao|cvv/g, 6, "🔒 Dados sensíveis");

// 🟡 MÉDIO
detectar(/urgente|agora|imediato|rapido/g, 3, "⚠️ Urgência");
detectar(/confirme|verifique|atualize/g, 3, "📋 Ação obrigatória");

// 🟠 LEVE
detectar(/oferta|promocao|ganhe|desconto/g, 2, "💰 Marketing suspeito");

// 🔗 LINKS
detectar(/http|www|\.com|\.br/g, 4, "🔗 Link suspeito");

// 📲 WHATSAPP
detectar(/codigo do whatsapp|codigo de verificacao/g, 6, "📲 Golpe de código");

// 🔥 FAKE NEWS
detectar(/compartilhe|divulgue|envie para todos/g, 3, "📢 Incentivo a compartilhar");
detectar(/antes que apaguem|vai sumir|removido/g, 4, "⚠️ Pressão de censura");
detectar(/midia nao mostra|verdade escondida/g, 4, "🌐 Teoria suspeita");

// 🟢 BAIXO RISCO
detectar(/reuniao|suporte|atendimento|confirmacao/g, -1, "✔ Linguagem normal");

// 🚨 COMBINAÇÕES

if (texto.match(/pix/) && texto.match(/urgente|agora/)) {
  score += 8;
  resultado += "🚨 PIX + urgência<br>";
}

if (
  texto.match(/compartilhe|divulgue/) &&
  texto.match(/urgente|agora|antes que/)
) {
  score += 6;
  resultado += "🚨 Compartilhamento forçado<br>";
}

// 📊 PORCENTAGEM
let porcentagem = Math.min(100, score * 10);

// 🎨 BARRA
let barra = document.getElementById("barra");
barra.style.width = porcentagem + "%";

if (porcentagem < 30) barra.style.background = "green";
else if (porcentagem < 70) barra.style.background = "orange";
else barra.style.background = "red";

// 💬 FRASES HUMANAS

let baixo = [
"🟢 Tudo parece normal por aqui.",
"🟢 Mensagem tranquila, nada suspeito.",
"🟢 Pode ficar tranquilo, não há sinais de golpe."
];

let leve = [
"🟠 Algo não está totalmente certo aqui.",
"🟠 Melhor analisar com mais calma.",
"🟠 Pode ser suspeito, fique atento."
];

let medio = [
"🟡 Algo não está certo aqui.",
"🟡 Melhor não confiar nessa mensagem.",
"🟡 Essa mensagem pode estar tentando te enganar."
];

let alto = [
"🔴 Isso aqui está com cara de golpe.",
"🔴 Muito suspeito, melhor evitar.",
"🔴 Alto risco! Não confie nessa mensagem."
];

// 📊 CLASSIFICAÇÃO

let nivel = "";
let frase = "";

if (porcentagem >= 70) {
  nivel = "🔴 ALTO RISCO";
  frase = aleatorio(alto);
} else if (porcentagem >= 40) {
  nivel = "🟡 MÉDIO RISCO";
  frase = aleatorio(medio);
} else if (porcentagem > 0) {
  nivel = "🟠 RISCO LEVE";
  frase = aleatorio(leve);
} else {
  nivel = "🟢 MENSAGEM SEGURA";
  frase = aleatorio(baixo);
}

// RESULTADO FINAL
document.getElementById("resultado").innerHTML =
"<b>" + nivel + " (" + porcentagem + "%)</b><br><br>" +
"<b>" + frase + "</b><br><br>" +
resultado +
"<br><b>Dica:</b> Não clique em links e não envie dados.";

}

// BOTÕES

function exemplo(tipo) {

let msg = "";

if (tipo == "premio") {
msg = "Parabéns! Você ganhou um prêmio, clique agora!";
}

if (tipo == "banco") {
msg = "Seu banco detectou problema, envie seu código urgente.";
}

if (tipo == "fake") {
msg = "Compartilhe antes que apaguem essa informação!";
}

document.getElementById("mensagem").value = msg;
analisar();
}

// DICAS

function toggleDicas() {
let d = document.getElementById("dicas");
d.style.display = d.style.display === "none" ? "block" : "none";
}

</script>

</body>
</html>
