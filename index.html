<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#e3f2fd,#f5f7fa);
  text-align:center;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
}

h1{
  color:#1565c0;
}

textarea{
  width:100%;
  height:120px;
  border-radius:10px;
  padding:10px;
  font-size:16px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
  background:#2196f3;
  color:white;
  font-weight:bold;
}

.result{
  margin-top:20px;
  background:white;
  padding:15px;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>🛡️ Escudo Digital</h1>
<p>Detecta golpes, fake news e mensagens perigosas.</p>

<textarea id="mensagem" placeholder="Digite ou cole a mensagem aqui"></textarea>

<br>
<button onclick="analisar()">🔎 Analisar mensagem</button>

<!-- RESULTADO -->
<div class="result" id="resultado"></div>

<!-- EXEMPLOS -->
<div style="margin-top:20px;">
<h3>⚠️ Exemplos de golpes</h3>

<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('premio')">🎁 Prêmio</button>
<button onclick="exemplo('fake')">📢 Fake News</button>
<button onclick="exemplo('pix')">💸 PIX</button>

</div>

<!-- TREINAMENTO -->
<div style="margin-top:30px;">
<h3>🧠 Treinamento para não cair em golpes</h3>

<p id="treinoTexto"></p>

<button onclick="responder(true)">❌ É golpe</button>
<button onclick="responder(false)">✔ É seguro</button>

<br><br>
<button onclick="novaPergunta()">🔄 Nova</button>

</div>

</div>

<script>

// ===================== IA PRINCIPAL =====================

function analisar(){

let texto = document.getElementById("mensagem").value.toLowerCase();

if(!texto){
alert("Digite uma mensagem primeiro!");
return;
}

let risco = 0;
let motivos = [];

// padrões perigosos
const regras = [
  {p:["cpf","senha","dados","código"],peso:30,m:"Pedido de dados pessoais"},
  {p:["urgente","agora","imediatamente"],peso:25,m:"Pressão de urgência"},
  {p:["clique","link"],peso:20,m:"Link suspeito"},
  {p:["ganhou","prêmio","promoção"],peso:25,m:"Promessa de prêmio"},
  {p:["pix","transferência"],peso:30,m:"Pedido de dinheiro"},
  {p:["bloqueado","suspenso"],peso:20,m:"Ameaça de bloqueio"}
];

// analisar
regras.forEach(r=>{
  r.p.forEach(palavra=>{
    if(texto.includes(palavra)){
      risco += r.peso;
      motivos.push(r.m);
    }
  });
});

// limite
if(risco>100) risco=100;

// resultado
let nivel = "";
let explicacao = "";

if(risco < 30){
nivel = "🟢 Parece seguro";
explicacao = "Não encontramos sinais fortes de golpe.";
}
else if(risco < 70){
nivel = "🟡 Atenção";
explicacao = "Essa mensagem tem alguns sinais suspeitos.";
}
else{
nivel = "🔴 CUIDADO! Isso parece golpe";
explicacao = "Essa mensagem tem vários sinais típicos de golpe.";
}

// mostrar
document.getElementById("resultado").innerHTML = `
<h3>${nivel}</h3>
<p><b>Risco:</b> ${risco}%</p>

<p><b>👉 O que percebemos:</b><br>
${motivos.join("<br>") || "Nenhum padrão detectado"}
</p>

<p><b>👉 Explicação simples:</b><br>
${explicacao}
</p>

<p><b>👉 O que fazer agora:</b><br>
• Não clique em links<br>
• Não envie dinheiro<br>
• Confirme com alguém de confiança
</p>
`;

}

// ===================== EXEMPLOS =====================

function exemplo(tipo){

const exemplos = {

banco:[
"Sua conta foi bloqueada. Envie seu CPF e senha agora.",
"Detectamos atividade suspeita. Confirme seus dados imediatamente.",
"Seu acesso foi suspenso. Atualize suas informações agora."
],

premio:[
"Parabéns! Você ganhou um prêmio. Clique e receba agora.",
"Você foi selecionado para ganhar R$5.000.",
"Última chance! Confirme seus dados para ganhar."
],

fake:[
"URGENTE: Governo vai bloquear contas amanhã!",
"Nova lei vai tirar seu dinheiro.",
"Alerta geral! Bancos vão fechar hoje."
],

pix:[
"Me faz um PIX urgente preciso agora!",
"Envie R$ agora via PIX por favor!",
"Transferência urgente necessária!"
]

};

let lista = exemplos[tipo];
let texto = lista[Math.floor(Math.random()*lista.length)];

document.getElementById("mensagem").value = texto;

}

// ===================== TREINAMENTO =====================

const perguntas = [
{t:"PIX urgente preciso agora",g:true},
{t:"Reunião amanhã às 10h",g:false},
{t:"Você ganhou um prêmio clique aqui",g:true},
{t:"Envie seu CPF para confirmar",g:true},
{t:"Atualização de sistema amanhã",g:false}
];

let atual = 0;

function novaPergunta(){
atual = Math.floor(Math.random()*perguntas.length);
document.getElementById("treinoTexto").innerText = perguntas[atual].t;
}

function responder(resposta){
if(resposta === perguntas[atual].g){
alert("✅ Acertou!");
}else{
alert("❌ Errou!");
}
novaPergunta();
}

// iniciar
novaPergunta();

</script>

</body>
</html>
