<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#eef4ff,#f9fbff);
  text-align:center;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

h1{ color:#1565c0; }

textarea{
  width:100%;
  height:120px;
  border-radius:10px;
  padding:10px;
  font-size:16px;
  border:1px solid #ccc;
}

button{
  padding:10px 14px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.primary{ background:#1976d2; color:white; }
.secondary{ background:#e3f2fd; color:#1565c0; }

.result{
  margin-top:20px;
  padding:15px;
  border-radius:10px;
  text-align:left;
}

.baixo{ background:#e8f5e9; border-left:5px solid #4caf50; }
.medio{ background:#fffde7; border-left:5px solid #ffb300; }
.alto{ background:#ffebee; border-left:5px solid #f44336; }

#feedbackTreino{ margin-top:10px; font-weight:bold; }
</style>
</head>

<body>

<div class="container">

<h1>🛡️ Escudo Digital</h1>
<p>Detecta golpes e ajuda você a não cair neles.</p>

<textarea id="mensagem" placeholder="Digite ou cole a mensagem"></textarea>

<br>
<button class="primary" onclick="analisar()">🔎 Analisar mensagem</button>
<button class="secondary" onclick="gerarMensagem()">✨ Gerar mensagem</button>

<br>
<button class="secondary" onclick="gerarPorNivel('alto')">🔴 Golpe</button>
<button class="secondary" onclick="gerarPorNivel('medio')">🟡 Suspeita</button>
<button class="secondary" onclick="gerarPorNivel('baixo')">🟢 Normal</button>

<div id="resultado" class="result"></div>

<h3>🧠 Treinamento</h3>
<p id="treinoTexto"></p>

<button onclick="responder(true)">❌ É golpe</button>
<button onclick="responder(false)">✔ É seguro</button>

<p id="feedbackTreino"></p>

<div>
<div style="background:#ddd;height:18px;border-radius:10px;">
<div id="barraProgresso" style="height:100%;width:0%;background:#4caf50;border-radius:10px;"></div>
</div>
<p id="textoProgresso">0 de 0</p>
</div>

</div>

<script>

// NORMALIZAR TEXTO
function normalizar(txt){
return txt.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

// ================= IA AVANÇADA =================
function analisar(){

let original = document.getElementById("mensagem").value;

if(!original){
document.getElementById("resultado").innerHTML="Digite uma mensagem.";
return;
}

let texto = normalizar(original);

let risco = 0;
let motivos = [];

// BANCO GRANDE (expandido)
const fortes = [
/troquei.*numero/,
/manda.*dinheiro/,
/pix.*urgente/,
/cartao.*clonado/,
/confirme.*dados/,
/envie.*cpf/,
/envie.*senha/,
/conta.*bloqueada/,
/acesso.*suspenso/,
/ganhou.*premio/,
/retire.*dinheiro/,
/transferencia.*urgente/,
/seguranca.*comprometida/,
/codigo.*seguranca/,
/envie.*cartao/,
/liberacao.*dinheiro/
];

const medios = [
/urgente/,/agora/,/rapido/,/clique/,/link/,
 /promocao/,/beneficio/,/oferta/,/aviso/,
 /verifique/,/confirme/,/pix/,/dinheiro/,
 /atualize/,/cadastro/
];

// ANÁLISE
fortes.forEach(r=>{
if(r.test(texto)){
risco += 45;
motivos.push("Padrão forte de golpe");
}
});

medios.forEach(r=>{
if(r.test(texto)){
risco += 12;
motivos.push("Sinal suspeito");
}
});

// CONTEXTO
if(texto.includes("urgente") && texto.includes("pix")){
risco += 40;
motivos.push("Urgência + dinheiro");
}

if(texto.includes("dados") && texto.includes("confirme")){
risco += 35;
motivos.push("Pedido de dados");
}

// LIMITE
if(risco > 100) risco = 100;

// NÍVEL
let nivel = risco < 30 ? "🟢 Seguro" :
risco < 70 ? "🟡 Atenção" :
"🔴 Golpe";

let classe = risco < 30 ? "baixo" :
risco < 70 ? "medio" :
"alto";

let r = document.getElementById("resultado");
r.className = "result " + classe;

// TIPO
let tipo="Indefinido";

if(texto.includes("troquei") || texto.includes("mãe")) tipo="Golpe do familiar";
else if(texto.includes("cartao") || texto.includes("conta")) tipo="Golpe bancário";
else if(texto.includes("premio")) tipo="Golpe de prêmio";
else if(texto.includes("pix")) tipo="Golpe PIX";
else if(texto.includes("link")) tipo="Golpe de link";

// EXPLICAÇÃO
let explicacao = risco<30
? "A mensagem parece normal, mas atenção sempre é importante."
: risco<70
? "Essa mensagem apresenta sinais suspeitos e pode ser golpe."
: "Essa mensagem tem vários sinais claros de golpe.";

// RESULTADO
r.innerHTML=`
<h3>${nivel}</h3>

<p><b>📌 Tipo:</b> ${tipo}</p>

<p><b>🔎 Explicação:</b><br>
${explicacao}
</p>

<p><b>⚠️ Sinais:</b><br>
${motivos.join("<br>") || "Nenhum forte"}
</p>

<p><b>👉 O que fazer:</b><br>
• Não clique em links<br>
• Não envie dinheiro<br>
• Não informe dados<br>
• Confirme fora da conversa
</p>
`;

}

// ================= GERAR =================
function gerarMensagem(){
const m=[
"Mãe troquei de número me manda dinheiro",
"PIX urgente preciso agora",
"Seu cartão foi clonado confirme dados",
"Promoção exclusiva informe dados",
"Conta bloqueada envie CPF",
"Você ganhou prêmio clique aqui",
"Atualize seus dados agora",
"Transferência urgente necessária",
"Ação urgente necessária",
"Seu pacote chegou clique aqui"
];
document.getElementById("mensagem").value = m[Math.floor(Math.random()*m.length)];
}

// GERAR POR NÍVEL
function gerarPorNivel(n){

const modelos={
alto:[
"Troquei de número me manda dinheiro",
"PIX urgente agora",
"Conta bloqueada envie dados",
"Cartão clonado confirme",
"Envie CPF agora",
"Transferência urgente",
"Atualize senha agora",
"Retire dinheiro urgente",
"Confirme dados imediatamente"
],
medio:[
"Verifique sua conta",
"Atualize seus dados",
"Promoção disponível",
"Confirme informações",
"Nova oferta",
"Atualização necessária",
"Mensagem importante",
"Aviso sistema",
"Revisão cadastro"
],
baixo:[
"Te ligo depois",
"Reunião amanhã",
"Cheguei em casa",
"Tudo certo",
"Boa noite",
"Vamos almoçar",
"Falo depois",
"Obrigado",
"Até amanhã"
]
};

document.getElementById("mensagem").value =
modelos[n][Math.floor(Math.random()*modelos[n].length)];

}

// TREINO
const perguntas=[
{t:"PIX urgente preciso agora",g:true},
{t:"Reunião amanhã",g:false},
{t:"Você ganhou prêmio",g:true},
{t:"Vamos almoçar?",g:false}
];

let atual=0,acertos=0,total=0;

function novaPergunta(){
atual=Math.floor(Math.random()*perguntas.length);
document.getElementById("treinoTexto").innerText=perguntas[atual].t;
}

function responder(r){
total++;
let f=document.getElementById("feedbackTreino");

if(r===perguntas[atual].g){
acertos++;
f.innerHTML="✅ Acertou";
f.style.color="green";
}else{
f.innerHTML="❌ Errou";
f.style.color="red";
}

let p=Math.round((acertos/total)*100);
document.getElementById("barraProgresso").style.width=p+"%";
document.getElementById("textoProgresso").innerText=acertos+" de "+total;

setTimeout(novaPergunta,1500);
}

novaPergunta();

</script>

</body>
</html>
