<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#e3f2fd,#f5f7fa);
text-align:center;
padding:20px;
}

.container{
max-width:720px;
margin:auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:120px;
resize:none;
padding:10px;
border-radius:10px;
font-size:16px;
}

button{
margin:5px;
padding:10px 15px;
border:none;
border-radius:10px;
background:#2196f3;
color:#fff;
cursor:pointer;
}

.result{
margin-top:20px;
padding:15px;
border-radius:10px;
}

.baixo{background:#c8e6c9;}
.medio{background:#fff9c4;}
.alto{background:#ffcdd2;}

.small{font-size:12px;opacity:0.7;}
</style>
</head>

<body>

<div class="container">

<h1>🛡️ Escudo Digital</h1>
<p class="small">Detecta golpes e mensagens suspeitas.</p>

<textarea id="mensagem" placeholder="Digite ou cole a mensagem..."></textarea>

<br>

<button onclick="analisar()">🔎 Analisar mensagem</button>
<button onclick="simular()">⚡ Simular golpe</button>

<div id="resultado" class="result"></div>

<div style="margin-top:10px;">
<p><b>Isso está correto?</b></p>
<button onclick="feedback(true)">✔ É golpe</button>
<button onclick="feedback(false)">👍 É seguro</button>
</div>

<hr>

<h3>🧠 Treinamento</h3>
<p id="treinoTexto">Clique em nova</p>

<button onclick="resposta(true)">✔ Confiar</button>
<button onclick="resposta(false)">❌ Golpe</button>
<br>
<button onclick="novoTreino()">🔄 Nova</button>

<p id="feedbackTreino"></p>
<p id="placar">Pontuação: 0 / 0</p>

</div>

<script>

// =====================
// 🧠 MEMÓRIA SEGURA
// =====================
function carregarMemoria(){
try{
return JSON.parse(localStorage.getItem("memoriaIA")) || [];
}catch{
return [];
}
}

function salvarMemoria(mem){
try{
localStorage.setItem("memoriaIA", JSON.stringify(mem));
}catch{}
}

// =====================
// 🧠 IA PRINCIPAL (100% SEGURA)
// =====================
function analisar(){

const resultado = document.getElementById("resultado");

try{

const campo = document.getElementById("mensagem");
if(!campo){
resultado.innerHTML = "<h3>Erro interno</h3>";
return;
}

const input = campo.value || "";

// campo vazio
if(input.trim() === ""){
resultado.className = "result medio";
resultado.innerHTML = "<h3>Digite uma mensagem</h3>";
return;
}

// NORMALIZAÇÃO SEGURA
let texto = input.toLowerCase();

if(texto.normalize){
texto = texto.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

texto = texto
.replace(/[@4]/g,"a")
.replace(/[1!]/g,"i")
.replace(/[3]/g,"e")
.replace(/[0]/g,"o")
.replace(/[^a-z0-9\s]/g," ")
.replace(/\s+/g," ")
.trim();

// =====================
let risco = 0;
let motivos = [];
let intencoes = new Set();
let gatilhos = 0;

// PADRÕES
const padroes = [
{r:/cpf|senha|codigo/,p:30,m:"Pedido de dados pessoais",i:"Roubo de dados"},
{r:/pix|transferencia|pagamento/,p:30,m:"Pedido de dinheiro",i:"Financeiro"},
{r:/urgente|agora|rapido/,p:20,m:"Pressão",i:"Pressão"},
{r:/bloqueado|suspenso/,p:25,m:"Ameaça",i:"Medo"},
{r:/clique|link|http/,p:25,m:"Link suspeito",i:"Redirecionamento"},
{r:/ganhou|premio|gratis/,p:25,m:"Promessa falsa",i:"Isca"}
];

padroes.forEach(p=>{
if(p.r.test(texto)){
risco += p.p;
motivos.push(p.m);
intencoes.add(p.i);
gatilhos++;
}
});

// COMBO
if(texto.includes("pix") && texto.includes("urgente")){
risco += 40;
motivos.push("PIX + urgência");
}

// INTENSIDADE
if(gatilhos >= 3){
risco += 15;
motivos.push("Muitos sinais suspeitos");
}

// APRENDIZADO
let memoria = carregarMemoria();

memoria.forEach(item=>{
if(item && item.texto){
let base = item.texto.substring(0,15);
if(texto.includes(base)){
if(item.golpe){
risco += 20;
motivos.push("Aprendido com uso");
}else{
risco -= 10;
}
}
}
});

// LIMITES
if(risco > 100) risco = 100;
if(risco < 0) risco = 0;

// CLASSIFICAÇÃO
let frase = "";
let classe = "";

if(risco < 30){
frase = "Mensagem tranquila.";
classe = "baixo";
}
else if(risco < 70){
frase = "Algo estranho aqui.";
classe = "medio";
}
else{
frase = "Isso parece golpe!";
classe = "alto";
}

// RESULTADO
resultado.className = "result " + classe;

resultado.innerHTML = `
<h3>${frase}</h3>
<p><b>Risco:</b> ${risco}%</p>
<p><b>Motivos:</b> ${motivos.join(", ") || "Nenhum"}</p>
<p><b>Intenção:</b> ${[...intencoes].join(", ") || "Nenhuma"}</p>
<p class="small">Se tiver dúvida, peça ajuda a alguém de confiança.</p>
`;

}catch(e){

console.error("ERRO REAL:", e);

resultado.className = "result medio";
resultado.innerHTML = "<h3>Erro ao analisar</h3>";

}

}

// =====================
// 🧠 FEEDBACK
// =====================
function feedback(eGolpe){

const texto = document.getElementById("mensagem").value.toLowerCase();
if(!texto) return;

let memoria = carregarMemoria();

memoria.push({texto:texto,golpe:eGolpe});

salvarMemoria(memoria);

document.getElementById("resultado").innerHTML += "<p class='small'>✔ IA aprendeu</p>";
}

// =====================
// ⚡ SIMULAÇÃO
// =====================
function simular(){
const golpes = [
"Envie seu CPF agora",
"PIX urgente",
"Você ganhou prêmio clique aqui",
"Sua conta será bloqueada"
];

document.getElementById("mensagem").value =
golpes[Math.floor(Math.random()*golpes.length)];
}

// =====================
// 🎮 TREINO
// =====================
let pontuacao = 0;
let rodada = 0;

const treinos = [
{texto:"Reunião amanhã",seguro:true},
{texto:"Envie seu CPF agora",seguro:false},
{texto:"PIX urgente",seguro:false},
{texto:"Documento enviado",seguro:true}
];

let treinoAtual = null;

function novoTreino(){
treinoAtual = treinos[Math.floor(Math.random()*treinos.length)];
document.getElementById("treinoTexto").innerText = treinoAtual.texto;
document.getElementById("feedbackTreino").innerText = "";
}

function resposta(v){

if(!treinoAtual) return;

rodada++;

if(v === treinoAtual.seguro){
pontuacao++;
document.getElementById("feedbackTreino").innerText = "✔ Acertou!";
}else{
document.getElementById("feedbackTreino").innerText = "❌ Errou!";
}

document.getElementById("placar").innerText =
"Pontuação: " + pontuacao + " / " + rodada;

}

</script>

</body>
</html>
