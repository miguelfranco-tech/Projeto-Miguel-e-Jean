<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#e3f2fd,#f5f7fa);
  text-align:center;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
}

textarea{
  width:100%;
  height:120px;
  border-radius:10px;
  padding:10px;
  font-size:16px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
  background:#2196f3;
  color:white;
  font-weight:bold;
}

.result{
  margin-top:20px;
  background:white;
  padding:15px;
  border-radius:10px;
}

#feedbackTreino{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🛡️ Escudo Digital</h1>
<p>Detecta golpes e ajuda você a não cair neles.</p>

<textarea id="mensagem" placeholder="Digite a mensagem aqui"></textarea>
<br>
<button onclick="analisar()">🔎 Analisar mensagem</button>

<div class="result" id="resultado"></div>

<!-- EXEMPLOS -->
<h3>⚠️ Exemplos de golpes</h3>

<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('premio')">🎁 Prêmio</button>
<button onclick="exemplo('fake')">📢 Fake News</button>
<button onclick="exemplo('pix')">💸 PIX</button>

<!-- TREINAMENTO -->
<h3 style="margin-top:30px;">🧠 Treinamento para não cair em golpes</h3>

<p id="treinoTexto"></p>

<button onclick="responder(true)">❌ É golpe</button>
<button onclick="responder(false)">✔ É seguro</button>

<br><br>
<button onclick="novaPergunta()">🔄 Nova</button>

<p id="feedbackTreino"></p>

<!-- BARRA -->
<div style="margin-top:15px;">
  <p><b>Seu progresso:</b></p>

  <div style="background:#ddd; border-radius:10px; height:20px;">
    <div id="barraProgresso" style="
      height:100%;
      width:0%;
      background:#4caf50;
      border-radius:10px;
      transition:0.4s;
    "></div>
  </div>

  <p id="textoProgresso">0 acertos</p>
</div>

</div>

<script>

// ================= IA =================
function analisar(){

let texto = document.getElementById("mensagem").value.toLowerCase();

if(!texto){
document.getElementById("resultado").innerHTML = "Digite uma mensagem primeiro.";
return;
}

let risco = 0;
let motivos = [];

const regras = [
{p:["cpf","senha","dados"],peso:30,m:"Pedido de dados pessoais"},
{p:["urgente","agora"],peso:25,m:"Pressão de urgência"},
{p:["clique","link"],peso:20,m:"Link suspeito"},
{p:["ganhou","prêmio"],peso:25,m:"Promessa de ganho fácil"},
{p:["pix","transferência"],peso:30,m:"Pedido de dinheiro"},
{p:["bloqueado","suspenso"],peso:20,m:"Ameaça de bloqueio"}
];

regras.forEach(r=>{
r.p.forEach(p=>{
if(texto.includes(p)){
risco += r.peso;
motivos.push(r.m);
}
});
});

if(risco>100) risco=100;

let nivel = "";
let explicacao = "";

if(risco < 30){
nivel = "🟢 Parece seguro";
explicacao = "Não encontramos sinais fortes de golpe.";
}
else if(risco < 70){
nivel = "🟡 Atenção";
explicacao = "Tem alguns sinais suspeitos.";
}
else{
nivel = "🔴 Isso parece golpe";
explicacao = "Mensagem com vários sinais de golpe.";
}

document.getElementById("resultado").innerHTML = `
<h3>${nivel}</h3>
<p><b>Risco:</b> ${risco}%</p>

<p><b>Motivos:</b><br>
${motivos.join("<br>") || "Nenhum identificado"}
</p>

<p><b>Explicação:</b><br>
${explicacao}
</p>

<p><b>👉 O que fazer agora:</b><br>
• Não clique em links<br>
• Não envie dinheiro<br>
• Confirme com alguém de confiança
</p>
`;

}

// ================= EXEMPLOS =================
function exemplo(tipo){

const exemplos = {

banco:[
"Sua conta foi bloqueada. Envie seus dados agora.",
"Confirme seu CPF imediatamente.",
"Conta suspensa, atualize informações."
],

premio:[
"Você ganhou um prêmio! Clique aqui.",
"Parabéns! Retire seu dinheiro agora.",
"Última chance de ganhar!"
],

fake:[
"URGENTE: bancos vão fechar amanhã!",
"Nova lei vai tirar dinheiro das contas.",
"Alerta geral no país!"
],

pix:[
"Faz um PIX urgente agora!",
"Me manda dinheiro rápido por favor.",
"Transferência necessária imediatamente."
]

};

let lista = exemplos[tipo];
let texto = lista[Math.floor(Math.random()*lista.length)];

document.getElementById("mensagem").value = texto;

}

// ================= TREINAMENTO =================
const perguntas = [
{t:"PIX urgente preciso agora",g:true},
{t:"Reunião amanhã às 10h",g:false},
{t:"Você ganhou um prêmio clique aqui",g:true},
{t:"Envie seu CPF para confirmar",g:true},
{t:"Atualização de sistema amanhã",g:false},

{t:"Mãe troquei de número, me manda dinheiro aqui",g:true},
{t:"Seu cartão foi clonado, confirme seus dados agora",g:true},
{t:"Oi, você pode falar agora?",g:false},
{t:"Promoção exclusiva, informe seus dados",g:true},
{t:"Vamos almoçar amanhã?",g:false},
{t:"Clique para evitar bloqueio da conta",g:true},
{t:"Seu pacote chegou, acompanhe aqui",g:true},
{t:"Te ligo mais tarde",g:false}
];

let atual = 0;
let acertos = 0;
let total = 0;

function novaPergunta(){
atual = Math.floor(Math.random()*perguntas.length);
document.getElementById("treinoTexto").innerText = perguntas[atual].t;
}

function responder(resposta){

const feedback = document.getElementById("feedbackTreino");

total++;

if(resposta === perguntas[atual].g){
acertos++;
feedback.innerHTML = "✅ Acertou!";
feedback.style.color = "green";
}else{
feedback.innerHTML = "❌ Era golpe!";
feedback.style.color = "red";
}

let porcentagem = Math.round((acertos/total)*100);

document.getElementById("barraProgresso").style.width = porcentagem + "%";
document.getElementById("textoProgresso").innerText =
acertos + " de " + total + " (" + porcentagem + "%)";

setTimeout(novaPergunta, 1000);

}

novaPergunta();

</script>

</body>
</html>
