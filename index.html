<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital IA</title>

<style>
body{
font-family:Arial;
background:#eef4ff;
padding:20px;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
}

textarea{
width:100%;
height:130px;
padding:10px;
border-radius:8px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

.primary{background:#1976d2;color:white;}
.secondary{background:#e3f2fd;}

.result{
margin-top:20px;
padding:15px;
border-radius:10px;
text-align:left;
}

.baixo{background:#e8f5e9;}
.medio{background:#fffde7;}
.alto{background:#ffebee;}
</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital</h2>

<textarea id="mensagem" placeholder="Digite a mensagem"></textarea><br>

<button class="primary" onclick="analisar()">🔎 Analisar</button>
<button class="secondary" onclick="gerarMensagem()">✨ Gerar</button>
<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('premio')">🎁 Prêmio</button>
<button onclick="exemplo('fake')">📰 Fake News</button>

<div id="resultado" class="result"></div>

</div>

<script>

// ================= NORMALIZAÇÃO =================
function normalizar(txt){
return txt.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^\w\s]/g,"");
}

// ================= CONTADOR =================
function contar(grupo, texto){
return grupo.filter(p => texto.includes(p)).length;
}

// ================= BASE DE PALAVRAS =================
const grupos = {

dinheiro:[
"pix","dinheiro","transferencia","deposito","pagamento","valor","grana","saldo","saque","credito"
],

dados:[
"cpf","senha","codigo","cartao","dados","confirmar","login","documento","identidade","validar"
],

urgencia:[
"urgente","agora","imediato","rapido","ja","hoje","mesmo","sem demora","na hora","correndo"
],

premio:[
"premio","ganhou","beneficio","sorteio","bonus","recompensa","gratuito","oferta","ganhador"
],

acao:[
"mande","envie","faca","confirme","clique","acesse","responda","digite","verifique"
],

banco:[
"conta","banco","cartao","acesso","bloqueado","suspenso","cancelado","seguranca","app"
]

};

// ================= FRASES DE GOLPE =================
const frasesAltas = [
"troquei de numero me manda pix urgente",
"ganhe dinheiro facil agora",
"conta bloqueada envie cpf",
"premio liberado informe dados",
"clique para receber dinheiro",
"seu cartao foi clonado confirme dados",
"envie codigo sms agora",
"liberacao pendente confirme dados",
"pix urgente preciso agora",
"envie dados bancarios imediatamente",
"pagamento urgente necessario",
"seguranca comprometida atualize dados",
"voce foi selecionado envie dados",
"clique e receba agora",
"validacao obrigatoria urgente",
"liberacao de valor agora",
"conta em risco confirme dados",
"seu acesso foi bloqueado",
"beneficio liberado informe cpf",
"ganhador confirmado clique agora"
];

// ================= EXEMPLOS =================
const exemplos = {
banco:[
"Conta bloqueada, confirme CPF imediatamente",
"Acesso suspeito detectado, atualize seus dados"
],
premio:[
"Você ganhou um prêmio, informe seus dados",
"Retire seu prêmio clicando aqui agora"
],
fake:[
"Nova lei libera dinheiro fácil para todos",
"Bancos vão fechar amanhã, saque tudo"
]
};

// ================= GERAR =================
function gerarMensagem(){
let todas = [
...frasesAltas,
"vamos almoçar amanhã",
"te ligo depois",
"reunião hoje"
];

document.getElementById("mensagem").value =
todas[Math.floor(Math.random()*todas.length)];
}

// ================= EXEMPLOS =================
function exemplo(tipo){
let lista = exemplos[tipo];
document.getElementById("mensagem").value =
lista[Math.floor(Math.random()*lista.length)];
}

// ================= IA PRINCIPAL =================
function analisar(){

let input = document.getElementById("mensagem").value;

if(!input){
document.getElementById("resultado").innerHTML="Digite uma mensagem.";
return;
}

let texto = normalizar(input);

let risco = 0;
let motivos = [];
let tipo = "";

// ================= FRASES =================
frasesAltas.forEach(f=>{
if(texto.includes(f)){
risco += 50;
motivos.push("🚨 Frase típica de golpe");
}
});

// ================= REGEX =================
if(/troquei.*numero.*(pix|dinheiro)/.test(texto)){
risco = 95;
tipo = "Golpe do falso número";
}

if(/(premio|ganhou|beneficio).*(cpf|dados|senha)/.test(texto)){
risco = Math.max(risco,90);
tipo = "Golpe de prêmio falso";
}

if(/(conta|banco).*(bloqueado|suspenso).*(cpf|confirmar)/.test(texto)){
risco = Math.max(risco,92);
tipo = "Golpe bancário";
}

// ================= SCORE =================
let score =
contar(grupos.dinheiro,texto)*3 +
contar(grupos.dados,texto)*4 +
contar(grupos.urgencia,texto)*2 +
contar(grupos.premio,texto)*3 +
contar(grupos.acao,texto)*2 +
contar(grupos.banco,texto)*3;

risco += score;

// ================= PEDIDO DIRETO =================
if(contar(grupos.acao,texto)>=1 &&
(contar(grupos.dinheiro,texto)>=1 || contar(grupos.dados,texto)>=1)){
risco = Math.max(risco,90);
motivos.push("🚨 Pedido direto suspeito");
}

// ================= URGÊNCIA =================
if(contar(grupos.urgencia,texto)>=2){
risco += 20;
motivos.push("⚠️ Pressão de urgência");
}

// ================= EMOÇÃO =================
const emocao = [
"me ajuda","por favor","socorro","preciso",
"urgente","agora","nao posso esperar"
];

if(contar(emocao,texto)>=2){
risco += 25;
motivos.push("⚠️ Tom emocional forte");
}

// ================= REPETIÇÃO =================
let repeticoes = (texto.match(/urgente|agora/g)||[]).length;
if(repeticoes>=3){
risco += 25;
motivos.push("🚨 Repetição de urgência");
}

// ================= CURTA =================
let palavras = texto.split(" ").length;

if(palavras<=6 &&
(texto.includes("pix")||texto.includes("cpf")||texto.includes("dados"))){
risco += 25;
motivos.push("⚠️ Mensagem curta suspeita");
}

// ================= PROTEÇÃO =================
if(risco < 30 &&
(texto.includes("pix")||texto.includes("cpf")||texto.includes("premio"))){
risco = 40;
}

// ================= FINAL =================
if(risco>100) risco=100;
if(risco<5) risco=5;

let nivel =
risco<30?"🟢 Seguro":
risco<70?"🟡 Atenção":"🔴 Golpe";

let classe =
risco<30?"baixo":
risco<70?"medio":"alto";

let explicacao =
risco>=70
? "A mensagem apresenta vários sinais típicos de golpe, como urgência, pedido direto ou promessa irreal."
: risco>=30
? "A mensagem possui alguns sinais suspeitos. É importante verificar antes de confiar."
: "A mensagem parece segura, mas mantenha atenção.";

// ================= RESULTADO =================
let r = document.getElementById("resultado");

r.className="result "+classe;

r.innerHTML=`
<h3>${nivel}</h3>
<p><b>Risco:</b> ${risco}%</p>
<p><b>Tipo:</b> ${tipo || "Não identificado"}</p>

<p><b>Explicação:</b><br>${explicacao}</p>

<p><b>Sinais:</b><br>
${motivos.join("<br>") || "Nenhum sinal forte"}
</p>

<p><b>O que fazer agora:</b><br>
• Não envie dinheiro<br>
• Não informe dados pessoais<br>
• Não clique em links suspeitos<br>
• Confirme com a pessoa real
</p>
`;
}

</script>

</body>
</html>
