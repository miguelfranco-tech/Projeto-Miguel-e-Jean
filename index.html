<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>🛡️ Escudo Digital</title>

<style>
body{
  font-family: Arial;
  background:#f4f7fb;
  margin:0;
  text-align:center;
}

header{
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  padding:20px;
}

textarea{
  width:85%;
  max-width:500px;
  height:120px;
  padding:10px;
  border-radius:10px;
  border:2px solid #ccc;
}

button{
  margin-top:10px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn-analisar{
  background:#4facfe;
  color:white;
}

.resultado{
  margin:20px auto;
  max-width:500px;
  padding:15px;
  border-radius:10px;
}

.barra{
  width:85%;
  max-width:500px;
  height:15px;
  background:#ddd;
  margin:10px auto;
  border-radius:10px;
}

.progresso{
  height:100%;
  width:0%;
  border-radius:10px;
  transition:0.5s;
}

.botoes-exemplo{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.botoes-exemplo button{
  background:#4facfe;
  color:white;
}

.dicas-box{
  display:none;
  background:#fff3cd;
  margin:15px auto;
  padding:15px;
  border-radius:10px;
  max-width:400px;
  text-align:left;
}
</style>
</head>

<body>

<header>
<h1>🛡️ ESCUDO DIGITAL</h1>
<p>Identifique golpes com segurança</p>
</header>

<h3>Cole a mensagem:</h3>
<textarea id="mensagem"></textarea>

<br>
<button class="btn-analisar" onclick="analisar()">🔍 ANALISAR</button>

<div class="barra"><div id="barra" class="progresso"></div></div>
<div id="resultado" class="resultado"></div>

<h3>Exemplos de golpes</h3>

<div class="botoes-exemplo">
<button onclick="exemploPremio()">🎁 Golpe de premiação</button>
<button onclick="exemploBanco()">🏦 Golpe bancário</button>
<button onclick="exemploFake()">📢 Fake news</button>
</div>

<br>
<button onclick="toggleDicas()">🛡️ Ver dicas de segurança</button>

<div id="dicas" class="dicas-box">
<ul>
<li>Nunca envie CPF, senha ou código</li>
<li>Desconfie de urgência</li>
<li>Não clique em links desconhecidos</li>
<li>Bancos não pedem dados por mensagem</li>
<li>Peça ajuda se tiver dúvida</li>
</ul>
</div>

<script>

function normalizar(t){
return t.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"");
}

function analisar(){

let texto = normalizar(document.getElementById("mensagem").value);

let score = 0;
let motivos = [];

// 🔴 ALTO RISCO
let alto = [
"pix urgente","chave pix inválida","pagamento pendente pix",
"transferência via pix","envie o pix agora","código do whatsapp",
"código de verificação","token de acesso","confirme seu login",
"redefina sua senha agora","dados do cartão","cvv do cartão",
"banco solicitando confirmação","acesso suspeito detectado",
"sua conta foi invadida"
];

// 🟡 MÉDIO
let medio = [
"ação imediata necessária","sua conta será afetada","acesso temporário liberado",
"confirmação urgente","sistema detectou atividade","tentativa de login",
"atualização de segurança","revisão obrigatória","validação pendente",
"acesso restrito","notificação importante","sua conta precisa de atenção",
"processo de verificação","autenticação pendente","alerta automático"
];

// 🟠 LEVE
let leve = [
"promoção especial","oferta exclusiva hoje","desconto imperdível",
"novidade pra você","veja agora","acesso liberado","confira já",
"só hoje","recomendado pra você","conteúdo exclusivo","você pode gostar",
"oportunidade limitada","vantagem especial","oferta personalizada","não perca"
];

// 🟢 NORMAL (reduz erro)
let baixo = [
"reunião online","link da reunião","arquivo anexo","encaminhamento",
"atualização do sistema","status do pedido","confirmação de presença",
"horário marcado","envio realizado","suporte técnico",
"atendimento ao cliente","contato realizado","retorno solicitado",
"informação adicional","acompanhamento do processo"
];

// DETECTAR
function verificar(lista, pontos, tipo){
lista.forEach(p=>{
if(texto.includes(p)){
score += pontos;
motivos.push(tipo+": "+p);
}
});
}

// EXECUÇÃO
verificar(alto,6,"🔴 Alto risco");
verificar(medio,3,"🟡 Médio risco");
verificar(leve,1,"🟠 Marketing");
verificar(baixo,-2,"🟢 Normal");

// 🔥 CONTEXTO INTELIGENTE
if(texto.includes("pix") && texto.includes("urgente")){
score += 8;
motivos.push("🚨 Pix + urgência");
}

if(texto.includes("senha") && texto.includes("codigo")){
score += 6;
motivos.push("🚨 Dados críticos");
}

if(texto.includes("link") && texto.includes("confirmar")){
score += 5;
motivos.push("🚨 Link + ação");
}

// LINKS
if(/http|link|clique/.test(texto)){
score += 3;
motivos.push("🔗 Contém link");
}

// LIMITES
if(score < 0) score = 0;

let risco = Math.min(score*4,100);

// CLASSIFICAÇÃO
let nivel="";
let cor="";

if(risco >=70){
nivel="🔴 ALTO RISCO DE GOLPE";
cor="#ff4d4d";
}
else if(risco >=40){
nivel="🟡 MÉDIO RISCO";
cor="#ffd633";
}
else if(risco >0){
nivel="🟠 BAIXO RISCO";
cor="#ffa64d";
}
else{
nivel="🟢 MENSAGEM SEGURA";
cor="#66cc66";
}

// BARRA
document.getElementById("barra").style.width = risco+"%";
document.getElementById("barra").style.background = cor;

// RESULTADO
document.getElementById("resultado").innerHTML =
"<b>"+nivel+"</b><br><br>Risco: "+risco+"%<br><br>"+motivos.join("<br>");

document.getElementById("resultado").style.background = cor;

}

// EXEMPLOS
function exemploPremio(){
document.getElementById("mensagem").value =
"Parabéns! Você ganhou um prêmio, envie seu CPF e pix urgente!";
analisar();
}

function exemploBanco(){
document.getElementById("mensagem").value =
"URGENTE: Sua conta foi invadida, confirme seu login agora!";
analisar();
}

function exemploFake(){
document.getElementById("mensagem").value =
"Compartilhe antes que apaguem essa informação!";
analisar();
}

// DICAS
function toggleDicas(){
let d = document.getElementById("dicas");
d.style.display = d.style.display==="none"?"block":"none";
}

</script>

</body>
</html>
