<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Escudo Digital</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#e0f2fe,#f8fafc);
  text-align:center;
  padding:20px;
}

.container{
  max-width:750px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{ color:#0284c7; }

.descricao{
  color:#64748b;
  font-size:14px;
  margin-bottom:15px;
}

/* 🔥 AGORA EDITÁVEL MAS FIXO */
textarea{
  width:100%;
  height:120px;
  border-radius:10px;
  padding:10px;
  border:2px solid #cbd5e1;
  background:#f8fafc;
  resize:none; /* impede mudar tamanho */
  outline:none;
}

button{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background: linear-gradient(135deg,#38bdf8,#0284c7);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{ transform:scale(1.05); }

#resultado{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:#f8fafc;
  display:none;
}

#barraContainer{
  background:#e2e8f0;
  border-radius:10px;
  margin-top:10px;
}

#barra{
  height:20px;
  border-radius:10px;
  width:0%;
  transition:0.8s;
}

#dicas{
  display:none;
  background:#fef3c7;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.simulador{
  margin-top:25px;
  padding:15px;
  background:#eff6ff;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<h1>🛡️ Escudo Digital</h1>
<p class="descricao">
Analisa mensagens e identifica possíveis golpes, fake news e manipulações digitais.
</p>

<textarea id="mensagem" placeholder="Digite ou escolha um exemplo..."></textarea>

<br>
<button onclick="analisar()">🔍 Analisar</button>

<div id="barraContainer">
  <div id="barra"></div>
</div>

<div id="resultado"></div>

<h3>Exemplos de golpes</h3>

<button onclick="exemplo('premio')">🎁 Golpe de premiação</button>
<button onclick="exemplo('banco')">🏦 Golpe bancário</button>
<button onclick="exemplo('fake')">📢 Fake news</button>

<br><br>
<button onclick="toggleDicas()">💡 Dicas de segurança</button>

<div id="dicas">
<p>✔ Nunca envie códigos</p>
<p>✔ Desconfie de urgência</p>
<p>✔ Não clique em links desconhecidos</p>
<p>✔ Bancos nunca pedem senha</p>
</div>

<!-- 🧠 TREINAMENTO -->
<div class="simulador">
<h3>🧠 Treinar contra golpes</h3>
<p id="simMsg"></p>

<button onclick="responder(true)">✔ Confiar</button>
<button onclick="responder(false)">❌ Desconfiar</button>

<p id="simRes"></p>

<button onclick="novaSim()">🔄 Nova mensagem</button>
</div>

</div>

<script>

function normalizar(t){
return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

// RESET
function resetUI(){
document.getElementById("resultado").style.display="none";
document.getElementById("barra").style.width="0%";
}

// EXEMPLOS
function exemplo(t){

resetUI();

let m="";

if(t=="premio") m="Parabéns! Você ganhou um prêmio, clique agora!";
if(t=="banco") m="Sua conta foi invadida, envie o código urgente!";
if(t=="fake") m="Compartilhe isso agora antes que seja apagado!";

document.getElementById("mensagem").value = m;

analisar();
}

// ANALISAR
function analisar(){

let texto = normalizar(document.getElementById("mensagem").value);

if(!texto.trim()){
alert("Digite ou escolha uma mensagem.");
return;
}

let score=0;
let motivos=[];
let explicacao=[];
let intencao=[];

// FAKE NEWS
if(/compartilh|repasse/.test(texto)){
score+=6;
intencao.push("desinformação");
}

if(/apag|censur|midia/.test(texto)){
score+=8;
explicacao.push("Sensação de censura");
}

// DADOS
if(/pix|senha|codigo|cartao/.test(texto)){
score+=7;
intencao.push("financeiro");
}

// URGÊNCIA
if(/urgente|agora/.test(texto)){
score+=5;
motivos.push("Pressão psicológica");
}

// MEDO
if(/invadida|bloqueada/.test(texto)){
score+=5;
}

// PROMESSA
if(/ganhe|premio/.test(texto)){
score+=4;
}

// COMBINAÇÕES
if(texto.includes("pix") && texto.includes("urgente")){
score+=12;
}

if(/compartilh/.test(texto) && /apag/.test(texto)){
score+=12;
}

// fallback
if(score === 0){
motivos.push("Mensagem comum");
explicacao.push("Nenhum padrão suspeito");
}

// RESULTADO
let porcentagem = Math.min(100, score * 10);

let barra = document.getElementById("barra");
barra.style.width = porcentagem + "%";

if(porcentagem<30) barra.style.background="green";
else if(porcentagem<70) barra.style.background="orange";
else barra.style.background="red";

let nivel="";
if(porcentagem>=70) nivel="🔴 ALTO RISCO";
else if(porcentagem>=40) nivel="🟡 MÉDIO RISCO";
else nivel="🟢 BAIXO RISCO";

let frasesAlta=[
"⚠️ Isso está com cara de golpe!",
"🚨 Muito suspeito!",
"❌ Não confie nisso!"
];

let frasesMedia=[
"🤔 Algo estranho aqui...",
"⚠️ Fique atento",
"🧐 Pode ser golpe"
];

let frasesBaixa=[
"🙂 Parece seguro",
"✔ Nada suspeito",
"👍 Mensagem comum"
];

let frase="";
if(porcentagem>=70) frase=frasesAlta[Math.floor(Math.random()*3)];
else if(porcentagem>=40) frase=frasesMedia[Math.floor(Math.random()*3)];
else frase=frasesBaixa[Math.floor(Math.random()*3)];

let res = document.getElementById("resultado");

res.style.display="block";

res.innerHTML =
"<b>"+nivel+" ("+porcentagem+"%)</b><br><br>"+
frase+"<br><br>"+
"<b>Intenção:</b> "+(intencao.join(", ")||"não identificada")+"<br><br>"+
"<b>Explicação:</b><br>"+explicacao.join("<br>")+
"<br><br><small>⚠️ Baseado em padrões comuns de golpes.</small>";

}

// DICAS
function toggleDicas(){
let d=document.getElementById("dicas");
d.style.display=d.style.display==="block"?"none":"block";
}

// 🧠 TREINAMENTO
let simulacoes=[
{msg:"Parabéns você ganhou dinheiro clique aqui", correto:false},
{msg:"Sua conta foi invadida envie código agora", correto:false},
{msg:"Reunião amanhã às 10h", correto:true},
{msg:"Compartilhe antes que apaguem", correto:false},
{msg:"Entrega confirmada amanhã", correto:true}
];

function novaSim(){
let s = simulacoes[Math.floor(Math.random()*simulacoes.length)];
window.simAtual = s;
document.getElementById("simMsg").innerText = s.msg;
document.getElementById("simRes").innerText = "";
}

function responder(resp){
if(resp === window.simAtual.correto){
document.getElementById("simRes").innerText="✅ Acertou!";
}else{
document.getElementById("simRes").innerText="❌ Era suspeito!";
}
}

novaSim();

</script>

</body>
</html>
