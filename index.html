<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#dbeafe,#f1f5f9);
text-align:center;
margin:0;
padding:20px;
}

.container{
max-width:750px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{color:#2563eb;}

textarea{
width:100%;
height:130px;
resize:none;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
box-sizing:border-box;
}

button{
margin:8px;
padding:10px 18px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

button:hover{transform:scale(1.05);}

.result{
margin-top:20px;
padding:18px;
border-radius:12px;
}

.baixo{background:#dcfce7;}
.medio{background:#fef9c3;}
.alto{background:#fee2e2;}

.small{font-size:14px;opacity:0.8;}
</style>
</head>

<body>

<div class="container">

<h1>🛡️ Escudo Digital</h1>

<p class="small">
Detecta golpes, fake news e tentativas de manipulação digital,
analisando mensagens de forma simples para proteger você.
</p>

<textarea id="msg" placeholder="Cole a mensagem aqui..."></textarea>

<br>

<button onclick="analisar()">🔎 Analisar mensagem</button>
<button onclick="simular()">⚡ Simular golpe</button>

<div id="res" class="result"></div>

<hr>

<h3>⚠️ Exemplos de golpes</h3>
<button onclick="setMsg('Você ganhou um prêmio! Clique aqui')">🎁 Premiação</button>
<button onclick="setMsg('Sua conta será bloqueada, envie CPF')">🏦 Banco</button>
<button onclick="setMsg('Compartilhe antes que apaguem isso')">📢 Fake News</button>

<hr>

<h3>🧠 Treinamento para não cair em golpes</h3>
<p id="treino">Clique em nova</p>

<button onclick="responder(true)">✔ Confiar</button>
<button onclick="responder(false)">❌ Desconfiar</button>
<br>
<button onclick="novoTreino()">🔄 Nova</button>

</div>

<script>

// FRASES HUMANAS
const baixo = ["Mensagem tranquila.","Parece seguro.","Nada perigoso aqui."];
const medio = ["Algo estranho aqui.","Melhor ter cuidado.","Não parece confiável."];
const alto = ["Isso tem cara de golpe.","Muito suspeito!","Não confie nisso."];

// PALAVRAS COM PESO
const pesos = [
{p:["cpf","senha","código","dados"],v:40,t:"dados"},
{p:["pix","transferência","pagamento"],v:40,t:"ganho"},
{p:["urgente","agora","rápido"],v:25,t:"urgencia"},
{p:["bloqueado","suspenso","cancelado"],v:35,t:"medo"},
{p:["clique aqui","link","acessar"],v:25,t:"link"},
{p:["ganhou","prêmio","promoção"],v:25,t:"ganho"},
{p:["compartilhe","repasse"],v:20,t:"fake"}
];

// TREINAMENTO
const treinoList = [
{t:"Reunião amanhã",s:true},
{t:"Envie seu CPF agora",s:false},
{t:"Você ganhou dinheiro",s:false},
{t:"Relatório pronto",s:true},
{t:"PIX urgente agora",s:false},
{t:"Confirma presença",s:true}
];

let atual;

// ANALISAR
function analisar(){

let texto = document.getElementById("msg").value.toLowerCase();
let risco=0;
let motivos=[];
let intencoes={};

pesos.forEach(grupo=>{
grupo.p.forEach(p=>{
if(texto.includes(p)){
risco+=grupo.v;
motivos.push(explicar(p));
intencoes[grupo.t]=true;
}
});
});

// COMBINAÇÕES PERIGOSAS
if(texto.includes("pix") && texto.includes("urgente")){
risco+=40;
motivos.push("pedido urgente de dinheiro");
}

if(texto.includes("cpf") && texto.includes("agora")){
risco+=40;
motivos.push("pressão para enviar dados");
}

// LIMITAR
if(risco>100) risco=100;

// FRASE
let frase;
let classe;

if(risco<30){frase=random(baixo);classe="baixo";}
else if(risco<70){frase=random(medio);classe="medio";}
else{frase=random(alto);classe="alto";}

// RESULTADO
document.getElementById("res").className="result "+classe;

document.getElementById("res").innerHTML=`
<h3>${frase}</h3>
<p><b>Risco:</b> ${risco}%</p>
<p><b>O que está acontecendo:</b> ${traduzIntencao(intencoes)}</p>
<p><b>Motivos:</b> ${motivos.join(", ") || "Nenhum"}</p>
<p><b>Explicação:</b> ${explicacao(risco,motivos)}</p>
<p class="small">Se tiver dúvida, peça ajuda para alguém de confiança.</p>
`;

}

// FUNÇÕES
function random(arr){return arr[Math.floor(Math.random()*arr.length)];}

function explicar(p){
if(p=="cpf") return "pedindo seus dados pessoais";
if(p=="pix") return "pedido de dinheiro";
if(p=="urgente") return "te apressando";
if(p=="bloqueado") return "tentando te assustar";
if(p=="clique aqui") return "link suspeito";
return p;
}

function traduzIntencao(i){
let txt=[];
if(i.medo) txt.push("tentando te assustar");
if(i.urgencia) txt.push("te apressando");
if(i.dados) txt.push("quer seus dados");
if(i.ganho) txt.push("promessa de vantagem");
return txt.join(", ") || "não identificado";
}

function explicacao(r,m){
if(r<30) return "Mensagem parece normal.";
if(r<70) return "Tem sinais estranhos: "+m.join(", ");
return "Mensagem com sinais claros de golpe: "+m.join(", ");
}

// EXTRAS
function setMsg(t){document.getElementById("msg").value=t;}

function simular(){
let lista=[
"Envie CPF agora ou será bloqueado",
"PIX urgente para liberar prêmio",
"Clique aqui para atualizar conta",
"Compartilhe isso antes que apaguem"
];
setMsg(random(lista));
}

// TREINO
function novoTreino(){
atual=random(treinoList);
document.getElementById("treino").innerText=atual.t;
}

function responder(r){
if(!atual){alert("Clique em nova");return;}
alert(r==atual.s?"✔ Acertou":"❌ Errou");
}

</script>

</body>
</html>
