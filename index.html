<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#eef4ff,#f9fbff);
text-align:center;
padding:20px;
}

.container{
max-width:750px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

textarea{
width:100%;
height:130px;
border-radius:10px;
padding:10px;
font-size:15px;
border:1px solid #ccc;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.primary{background:#1976d2;color:white;}
.secondary{background:#e3f2fd;color:#1565c0;}

.result{
margin-top:20px;
padding:15px;
border-radius:10px;
text-align:left;
}

.baixo{background:#e8f5e9;border-left:5px solid green;}
.medio{background:#fffde7;border-left:5px solid orange;}
.alto{background:#ffebee;border-left:5px solid red;}
</style>
</head>

<body>

<div class="container">

<h1>🛡️ Escudo Digital</h1>

<textarea id="mensagem" placeholder="Digite ou cole a mensagem"></textarea>

<br>
<button class="primary" onclick="analisar()">🔎 Analisar</button>
<button class="secondary" onclick="gerarMensagem()">✨ Gerar mensagem</button>

<br>
<button class="secondary" onclick="gerarPorNivel('alto')">🔴 Golpe</button>
<button class="secondary" onclick="gerarPorNivel('medio')">🟡 Suspeita</button>
<button class="secondary" onclick="gerarPorNivel('baixo')">🟢 Normal</button>

<h3>⚠️ Exemplos de golpes</h3>
<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('premio')">🎁 Prêmio</button>
<button onclick="exemplo('fake')">📢 Fake News</button>

<div id="resultado" class="result"></div>

</div>

<script>

// ================= NORMALIZAR =================
function normalizar(txt){
return txt.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

// ================= BANCO MASSIVO =================
const frases = {

alto:[
"troquei de numero me manda pix urgente","preciso de dinheiro agora urgente",
"conta bloqueada envie cpf para desbloquear","seu cartao foi clonado confirme dados",
"ganhe dinheiro facil agora","clique para receber premio","envie senha urgente",
"retire dinheiro agora","transferencia urgente","envie dados bancarios",
"liberacao de valor pendente","seguranca comprometida atualize dados",
"codigo invalido confirme","acesso negado envie dados","dinheiro bloqueado confirme",
"beneficio liberado informe dados","pix necessario agora","manda dinheiro rapido",
"confirmacao urgente de conta","atualize senha agora","ganhe dinheiro sem esforço",
"receba dinheiro rapido","clique urgente link","pagamento urgente necessario",
"premio liberado dados","codigo de seguranca invalido","envie comprovante agora",
"confirmacao obrigatoria imediata","sua conta sera bloqueada",
"verificacao urgente de seguranca","envie foto do cartao",
"liberacao urgente de dinheiro","confirme cpf agora",
"transferencia falhou confirme dados","acesso restrito confirme"
],

medio:[
"verifique sua conta","atualize seus dados","nova promocao disponivel",
"beneficio ativo","mensagem importante","aviso sistema","acao necessaria",
"cadastro revisao","novo acesso","info pendente","atualizacao necessaria",
"oferta especial","promocao limitada","verificacao recomendada",
"nova notificacao","alerta importante","confirme informacoes",
"acesso recente detectado","revisao sistema","cheque sua conta",
"notificacao importante","aviso de seguranca","confira detalhes"
],

baixo:[
"vamos conversar depois","te ligo mais tarde","reuniao amanha",
"tudo certo","boa noite","vamos almocar","obrigado","ate amanha",
"cheguei em casa","tudo tranquilo","falamos depois","me chama depois",
"pode deixar","combinado","depois vemos isso","ok tranquilo",
"ja resolvi isso","te aviso depois","fica tranquilo"
]

};

// ================= PALAVRAS =================
const palavrasAlto = ["pix","cpf","senha","codigo","urgente","agora","transferencia","dinheiro","bloqueado","confirme","cartao","banco","login","seguranca","validacao"];

const palavrasMedio = ["verifique","atualize","aviso","alerta","importante","oferta","promocao","beneficio","notificacao","acesso","mensagem","sistema","dados","cadastro","online"];

// ================= ANALISAR =================
function analisar(){

let texto = normalizar(document.getElementById("mensagem").value);

if(!texto){
document.getElementById("resultado").innerHTML="Digite uma mensagem.";
return;
}

let risco=0;
let motivos=[];

function add(v,m){
risco+=v;
motivos.push(m);
}

// ================= FRASES =================
frases.alto.forEach(f=>{
if(texto.includes(f)) add(60,"🚨 Frase típica de golpe");
});

frases.medio.forEach(f=>{
if(texto.includes(f)) add(20,"⚠️ Frase suspeita");
});

// ================= PALAVRAS =================
palavrasAlto.forEach(p=>{
if(texto.includes(p)) add(12,"Palavra forte: "+p);
});

palavrasMedio.forEach(p=>{
if(texto.includes(p)) add(5,"Palavra suspeita: "+p);
});

// ================= IA ESTRUTURAL =================
function tem(...p){return p.some(x=>texto.includes(x));}

if(tem("pix","dinheiro") && tem("urgente","agora")){
add(70,"🚨 Pedido urgente de dinheiro");
}

if(tem("cpf","senha","dados") && tem("envie","confirme")){
add(70,"🚨 Pedido de dados sensíveis");
}

if(tem("premio") && tem("dados","retire")){
add(75,"🚨 Golpe de prêmio falso");
}

if(tem("conta") && tem("bloqueada")){
add(70,"🚨 Bloqueio falso de conta");
}

if(tem("dinheiro") && tem("facil")){
add(80,"🚨 Promessa de dinheiro fácil");
}

// ================= LINKS =================
let links = texto.match(/https?:\/\/[^\s]+|www\.[^\s]+/g);

if(links){
links.forEach(l=>{

if(l.includes(".ru")||l.includes(".xyz")||l.includes(".tk")||l.includes("bit.ly")){
add(80,"🚨 Link suspeito ou encurtado");
}

if(l.includes("login")||l.includes("verify")||l.includes("update")){
add(50,"⚠️ Link tentando parecer oficial");
}

});
}

// ================= BANCO FALSO =================
const bancos=["nubank","itau","bradesco","santander","caixa","bb"];

if(links){
links.forEach(l=>{
bancos.forEach(b=>{
if(l.includes(b) && !l.includes(".com.br")){
add(85,"🚨 Possível banco falso ("+b+")");
}
});
});
}

// ================= REGRAS ANTI-ERRO =================
if(risco >= 60 && risco < 70){
risco = 70;
}

if(
texto.includes("cpf") ||
texto.includes("senha") ||
texto.includes("pix") ||
texto.includes("premio")
){
risco += 20;
}

// ================= FINAL =================
if(risco>100) risco=100;
if(risco<5) risco=5;

let nivel = risco<30?"🟢 Seguro":risco<70?"🟡 Atenção":"🔴 Golpe";
let classe = risco<30?"baixo":risco<70?"medio":"alto";

// ================= RESPOSTA HUMANA =================
let explicacao =
risco<30
? "Essa mensagem parece normal, sem sinais claros de golpe. Mesmo assim, sempre vale manter atenção ao lidar com informações pessoais."
: risco<70
? "Essa mensagem possui alguns sinais suspeitos. Pode ser uma tentativa de enganar você, então o ideal é não tomar decisões rápidas."
: "Essa mensagem apresenta vários sinais típicos de golpe. Ela provavelmente tenta enganar você para obter dinheiro ou dados pessoais.";

// ================= RESULTADO =================
let r = document.getElementById("resultado");
r.className="result "+classe;

r.innerHTML=`
<h3>${nivel}</h3>

<p><b>📊 Risco:</b> ${risco}%</p>

<p><b>🔎 Entenda:</b><br>
${explicacao}
</p>

<p><b>⚠️ Sinais encontrados:</b><br>
${motivos.join("<br>") || "Nenhum sinal forte identificado"}
</p>

<p><b>👉 O que fazer agora:</b><br>
• Não clique em links suspeitos<br>
• Não envie dinheiro<br>
• Não compartilhe dados pessoais<br>
• Confirme a informação com a fonte real
</p>
`;

}

// ================= GERAR =================
function gerarMensagem(){
let todas=[...frases.alto,...frases.medio,...frases.baixo];
document.getElementById("mensagem").value =
todas[Math.floor(Math.random()*todas.length)];
}

function gerarPorNivel(n){
document.getElementById("mensagem").value =
frases[n][Math.floor(Math.random()*frases[n].length)];
}

// ================= EXEMPLOS =================
function exemplo(t){

const exemplos = {

banco:[
"Conta bloqueada, envie CPF para desbloquear",
"Seu banco detectou atividade suspeita, confirme dados"
],

premio:[
"Você ganhou um prêmio, informe seus dados",
"Retire seu prêmio agora clicando aqui"
],

fake:[
"Nova lei permite ganhar dinheiro fácil",
"URGENTE bancos vão fechar amanhã"
]

};

let lista = exemplos[t];

document.getElementById("mensagem").value =
lista[Math.floor(Math.random()*lista.length)];

}

</script>

</body>
</html>
