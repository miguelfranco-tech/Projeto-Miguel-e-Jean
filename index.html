<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Escudo Digital</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #121212;
  color: white;
  padding: 20px;
}

textarea {
  width: 80%;
  height: 120px;
  border-radius: 10px;
  padding: 10px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

#resultado {
  margin-top: 20px;
  font-size: 18px;
}

.barra {
  width: 80%;
  height: 20px;
  background: #333;
  margin: 10px auto;
  border-radius: 10px;
  overflow: hidden;
}

.progresso {
  height: 100%;
  width: 0%;
}

.divisor {
  margin: 30px 0;
  border-top: 1px solid #444;
}
</style>

</head>

<body>

<h1>🛡️ Escudo Digital</h1>

<textarea id="mensagem" placeholder="Cole a mensagem aqui..."></textarea><br>

<button onclick="analisar()">Analisar</button>

<div class="barra">
  <div id="barra" class="progresso"></div>
</div>

<div id="resultado"></div>

<div class="divisor"></div>

<!-- FRASE NOVA -->
<h3>💡 Não sabe como funciona um golpe? Veja na prática abaixo:</h3>

<!-- BOTÕES DE DEMO -->
<button onclick="demo1()">🎁 Golpe de prêmio</button>
<button onclick="demo2()">⚠️ Urgência bancária</button>
<button onclick="demo3()">🌐 Fake news</button>

<script>

function analisar() {

let texto = document.getElementById("mensagem").value.toLowerCase();
texto = texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

let score = 0;
let explicacao = [];

function detectar(palavras, pontos, nome) {
  palavras.forEach(p => {
    if (texto.includes(p)) {
      score += pontos;
      explicacao.push(nome + " → " + p);
    }
  });
}

detectar(["urgente","agora","imediato","rapido"],2,"Urgência");
detectar(["ganhe","lucro","rico","dinheiro"],3,"Promessa");
detectar(["premio","oferta","brinde"],2,"Oferta");
detectar(["cpf","senha","codigo","cartao"],5,"Dados sensíveis");
detectar(["segredo","ajuda","desesperado"],2,"Emoção");
detectar(["midia","censurado","escondem"],3,"Fake news");
detectar(["clique","link","acesse"],3,"Link");

// COMBINAÇÕES
if (texto.includes("urgente") && texto.includes("cpf")) {
  score += 6;
  explicacao.push("Combinação perigosa: urgência + dados");
}

if (texto.includes("ganhe") && texto.includes("rapido")) {
  score += 5;
  explicacao.push("Promessa irreal reforçada");
}

// CLASSIFICAÇÃO
let nivel = "";
let cor = "";

if (score >= 12) {
  nivel = "🔴 Alto risco";
  cor = "red";
} else if (score >= 6) {
  nivel = "🟡 Médio risco";
  cor = "yellow";
} else if (score > 0) {
  nivel = "🟠 Baixo risco";
  cor = "orange";
} else {
  nivel = "🟢 Seguro";
  cor = "green";
}

// BARRA
let porcentagem = Math.min(score * 8, 100);
document.getElementById("barra").style.width = porcentagem + "%";
document.getElementById("barra").style.background = cor;

// RESULTADO
document.getElementById("resultado").innerHTML =
"<b>" + nivel + "</b><br><br>" +
"📊 Pontuação: " + score + "<br><br>" +
"🔎 Detecção:<br>" + explicacao.join("<br>");

}

// DEMOS
function demo1() {
document.getElementById("mensagem").value =
"Parabéns! Você ganhou um prêmio exclusivo, clique no link agora e informe seu CPF!";
}

function demo2() {
document.getElementById("mensagem").value =
"URGENTE! Sua conta será bloqueada, confirme seus dados bancários agora!";
}

function demo3() {
document.getElementById("mensagem").value =
"A mídia não mostra isso! Compartilhe antes que apaguem essa verdade chocante!";
}

</script>

</body>
</html>
