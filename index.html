<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>🛡️ Escudo Digital</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#dbeafe,#f0f9ff);
  text-align:center;
  padding:20px;
}

.container{
  max-width:750px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

textarea{
  width:100%;
  height:120px;
  border-radius:10px;
  padding:10px;
  border:2px solid #cbd5e1;
}

button{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background: linear-gradient(135deg,#38bdf8,#0284c7);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{ transform:scale(1.05); }

#resultado{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:#f8fafc;
  opacity:0;
  transform:translateY(10px);
  transition:0.4s;
}

#resultado.ativo{
  opacity:1;
  transform:translateY(0);
}

#barraContainer{ background:#e2e8f0; border-radius:10px; margin-top:10px; }
#barra{ height:20px; border-radius:10px; width:0%; transition:0.8s; }

.alerta{ animation:tremer 0.3s; }

@keyframes tremer{
0%{transform:translateX(0);}
25%{transform:translateX(-3px);}
50%{transform:translateX(3px);}
75%{transform:translateX(-3px);}
100%{transform:translateX(0);}
}

#dicas{
  display:none;
  background:#fef3c7;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.simulador{
  margin-top:25px;
  padding:15px;
  background:#eff6ff;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital</h2>

<textarea id="mensagem" placeholder="Cole a mensagem..."></textarea>

<button onclick="analisar()">🔍 Analisar</button>

<div id="barraContainer"><div id="barra"></div></div>
<div id="resultado"></div>

<h3>Exemplos</h3>
<button onclick="exemplo('premio')">🎁 Premiação</button>
<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('fake')">📢 Fake News</button>

<br><br>
<button onclick="toggleDicas()">💡 Dicas</button>

<div id="dicas">
<p>Nunca envie códigos.</p>
<p>Desconfie de urgência.</p>
<p>Não clique em links desconhecidos.</p>
</div>

<div class="simulador">
<h3>🧠 Treinar contra golpes</h3>
<p id="simMsg"></p>
<button onclick="responder(true)">✔ Confiar</button>
<button onclick="responder(false)">❌ Desconfiar</button>
<p id="simRes"></p>
<button onclick="novaSim()">🔄 Nova</button>
</div>

</div>

<script>

function normalizar(t){
return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function analisar(){

let texto = normalizar(document.getElementById("mensagem").value);

if(!texto.trim()){
alert("Digite algo!");
return;
}

let score=0;
let motivos=[];
let explicacao=[];
let intencao=[];

// 🔍 DETECÇÃO BASE
if(/pix|cartao|cvv|senha|codigo/.test(texto)){
score+=6;
motivos.push("🔒 Pedido de dados sensíveis");
intencao.push("financeiro/dados");
}

if(/urgente|agora|imediato/.test(texto)){
score+=4;
motivos.push("⚠️ Pressão de urgência");
explicacao.push("Tenta fazer você agir sem pensar");
}

if(/link|http|www/.test(texto)){
score+=4;
motivos.push("🔗 Link suspeito");
}

// 🧠 EMOÇÃO
if(/perigo|bloqueada|invadida|problema/.test(texto)){
score+=5;
explicacao.push("Usa medo para pressionar");
}

if(/ganhe|premio|lucro/.test(texto)){
score+=4;
explicacao.push("Usa recompensa para atrair");
}

// ⚠️ PRESSÃO PSICOLÓGICA
if(/agora mesmo|ultimas horas|nao perca/.test(texto)){
score+=5;
explicacao.push("Cria senso de urgência extrema");
}

// 💥 COMBINAÇÕES
if(texto.includes("pix") && texto.includes("urgente")){
score+=10;
explicacao.push("Combinação clássica de golpe financeiro");
}

if(texto.includes("codigo") && texto.includes("whatsapp")){
score+=10;
explicacao.push("Tentativa de roubo de conta");
}

// 📊 PORCENTAGEM
let porcentagem=Math.min(100,score*10);

// 🎨 BARRA
let barra=document.getElementById("barra");
barra.style.width=porcentagem+"%";

if(porcentagem<30) barra.style.background="green";
else if(porcentagem<70) barra.style.background="orange";
else barra.style.background="red";

// 🎯 NÍVEL
let nivel="";
if(porcentagem>=70) nivel="🔴 ALTO RISCO";
else if(porcentagem>=40) nivel="🟡 MÉDIO RISCO";
else if(porcentagem>0) nivel="🟠 BAIXO RISCO";
else nivel="🟢 SEGURO";

// 🧠 INTENSIDADE
let intensidade = "";
if(score>15) intensidade="Alta manipulação detectada";
else if(score>8) intensidade="Manipulação moderada";
else intensidade="Baixa manipulação";

// RESULTADO
let res=document.getElementById("resultado");

res.innerHTML=
"<b>"+nivel+" ("+porcentagem+"%)</b><br><br>"+
"<b>🧠 Intensidade:</b> "+intensidade+"<br><br>"+
"<b>🎯 Possível intenção:</b> "+(intencao.join(", ")||"Não identificada")+"<br><br>"+
"<b>⚠️ Motivos:</b><br>"+motivos.join("<br>")+"<br><br>"+
"<b>💬 Explicação:</b><br>"+explicacao.join("<br>");

res.classList.add("ativo");

}

// EXEMPLOS
function exemplo(t){
let m="";
if(t=="premio") m="Parabéns! Ganhe dinheiro agora, clique no link!";
if(t=="banco") m="Sua conta foi invadida, envie código urgente!";
if(t=="fake") m="Compartilhe antes que apaguem essa informação!";
document.getElementById("mensagem").value=m;
analisar();
}

// DICAS
function toggleDicas(){
let d=document.getElementById("dicas");
d.style.display=d.style.display==="block"?"none":"block";
}

// SIMULADOR
let simulacoes=[
{msg:"Seu banco pede código urgente", correto:false},
{msg:"Reunião amanhã às 10h", correto:true}
];

function novaSim(){
let s=simulacoes[Math.floor(Math.random()*simulacoes.length)];
window.simAtual=s;
document.getElementById("simMsg").innerText=s.msg;
document.getElementById("simRes").innerText="";
}

function responder(r){
if(r==window.simAtual.correto){
document.getElementById("simRes").innerText="✅ Correto!";
}else{
document.getElementById("simRes").innerText="❌ Era golpe!";
}
}

novaSim();

</script>

</body>
</html>
