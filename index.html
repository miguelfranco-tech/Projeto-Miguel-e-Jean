<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>🛡️ Escudo Digital</title>

<style>

body{
  font-family: Arial;
  background: linear-gradient(135deg,#dbeafe,#f0f9ff);
  text-align:center;
  padding:20px;
}

.container{
  max-width:750px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

textarea{
  width:100%;
  height:120px;
  border-radius:10px;
  padding:10px;
  border:2px solid #cbd5e1;
  font-size:16px;
}

button{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background: linear-gradient(135deg,#38bdf8,#0284c7);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  opacity:0.9;
}

#resultado{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:#f8fafc;
  opacity:0;
  transform:translateY(10px);
  transition:0.4s;
}

#resultado.ativo{
  opacity:1;
  transform:translateY(0);
}

#barraContainer{
  background:#e2e8f0;
  border-radius:10px;
  margin-top:10px;
}

#barra{
  height:20px;
  border-radius:10px;
  width:0%;
  transition:0.8s;
}

@keyframes tremer{
  0%{transform:translateX(0);}
  25%{transform:translateX(-3px);}
  50%{transform:translateX(3px);}
  75%{transform:translateX(-3px);}
  100%{transform:translateX(0);}
}

.alerta{
  animation:tremer 0.3s;
}

#dicas{
  display:none;
  background:#fef3c7;
  border-left:5px solid #f59e0b;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.simulador{
  margin-top:25px;
  padding:15px;
  background:#eff6ff;
  border-left:5px solid #3b82f6;
  border-radius:12px;
}

</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital</h2>

<textarea id="mensagem" placeholder="Cole a mensagem aqui..."></textarea>

<button onclick="analisar()">🔍 Analisar</button>

<div id="barraContainer"><div id="barra"></div></div>
<div id="resultado"></div>

<h3>Exemplos</h3>
<button onclick="exemplo('premio')">🎁 Premiação</button>
<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('fake')">📢 Fake News</button>

<br><br>
<button onclick="toggleDicas()">💡 Dicas de segurança</button>

<div id="dicas">
<p>Nunca envie senha ou código.</p>
<p>Não clique em links desconhecidos.</p>
<p>Desconfie de urgência.</p>
</div>

<div class="simulador">
<h3>🧠 Treinar contra golpes</h3>

<p id="simMsg"></p>

<button onclick="responder(true)">✔ Confiar</button>
<button onclick="responder(false)">❌ Desconfiar</button>

<p id="simRes"></p>

<button onclick="novaSim()">🔄 Nova mensagem</button>
</div>

</div>

<script>

function normalizar(t){
return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function aleatorio(l){
return l[Math.floor(Math.random()*l.length)];
}

let frases={
baixo:["🟢 Tudo parece normal.","🟢 Pode ficar tranquilo."],
medio:["🟡 Algo não está certo.","🟡 Melhor analisar com calma."],
alto:["🔴 Isso está com cara de golpe!","🔴 Muito suspeito, cuidado!"]
};

function analisar(){

let texto = normalizar(document.getElementById("mensagem").value);

if(!texto.trim()){
  alert("Digite uma mensagem primeiro!");
  return;
}

let score=0;
let motivos="";

function detectar(regex,pontos,msg){
let m=texto.match(regex);
if(m){
score+=pontos*m.length;
motivos+=msg+"<br>";
}
}

detectar(/pix|senha|codigo|cartao|cvv/g,6,"🔒 Dados sensíveis");
detectar(/urgente|agora|imediato/g,3,"⚠️ Urgência");
detectar(/http|www|\.com|\.br/g,4,"🔗 Link suspeito");

detectar(/compartilhe|divulgue/g,3,"📢 Compartilhar");
detectar(/antes que apaguem|vai sumir/g,4,"⚠️ Pressão");

detectar(/reuniao|suporte|atendimento|confirmacao/g,-1,"✔ Linguagem normal");

if(texto.includes("pix") && texto.includes("urgente")) score+=8;
if(texto.includes("compartilhe") && texto.includes("urgente")) score+=6;

let porcentagem=Math.min(100,score*10);

let barra=document.getElementById("barra");
barra.style.width=porcentagem+"%";

if(porcentagem<30) barra.style.background="green";
else if(porcentagem<70) barra.style.background="orange";
else barra.style.background="red";

let nivel,frase;
let res=document.getElementById("resultado");

res.classList.remove("alerta");
void res.offsetWidth;

if(porcentagem>=70){
nivel="🔴 ALTO RISCO";
frase=aleatorio(frases.alto);
res.classList.add("alerta");
}
else if(porcentagem>=40){
nivel="🟡 MÉDIO RISCO";
frase=aleatorio(frases.medio);
}
else if(porcentagem>0){
nivel="🟠 BAIXO RISCO";
frase=aleatorio(frases.medio);
}
else{
nivel="🟢 SEGURO";
frase=aleatorio(frases.baixo);
}

res.innerHTML=
"<b>"+nivel+" ("+porcentagem+"%)</b><br><br>"+
"<b>"+frase+"</b><br><br>"+motivos;

res.classList.add("ativo");

}

function exemplo(t){
let m="";
if(t=="premio") m="Parabéns! Você ganhou um prêmio, clique agora!";
if(t=="banco") m="Sua conta será bloqueada, informe seu código urgente!";
if(t=="fake") m="Compartilhe antes que apaguem essa informação!";
document.getElementById("mensagem").value=m;
analisar();
}

function toggleDicas(){
let d=document.getElementById("dicas");
if(d.style.display==="block"){
  d.style.display="none";
}else{
  d.style.display="block";
}
}

let simulacoes=[
{msg:"Seu banco pede confirmação urgente de código", correto:false},
{msg:"Promoção exclusiva, clique agora", correto:false},
{msg:"Reunião marcada amanhã às 10h", correto:true}
];

function novaSim(){
let s=aleatorio(simulacoes);
window.simAtual=s;
document.getElementById("simMsg").innerText=s.msg;
document.getElementById("simRes").innerText="";
}

function responder(resp){
if(!window.simAtual) return;

if(resp==window.simAtual.correto){
document.getElementById("simRes").innerText="✅ Boa! Você acertou.";
}else{
document.getElementById("simRes").innerText="❌ Cuidado! Isso pode ser golpe.";
}
}

novaSim();

</script>

</body>
</html>
