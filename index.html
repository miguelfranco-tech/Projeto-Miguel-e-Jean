<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>🛡️ Escudo Digital</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}

textarea{
  width:85%;
  height:120px;
  border-radius:10px;
  padding:10px;
}

button{
  padding:10px 15px;
  margin:5px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  background:#1e293b;
  color:white;
}

button:hover{background:#334155}

#resultado{
  margin-top:20px;
  padding:15px;
  border-radius:10px;
  background:#111827;
}

.barra{
  width:80%;
  height:18px;
  background:#1f2937;
  margin:10px auto;
  border-radius:10px;
}

.progresso{
  height:100%;
  width:0%;
  border-radius:10px;
  transition:0.5s;
}

.divisor{
  margin:30px 0;
  border-top:1px solid #334155;
}

h3{color:#22c55e}
</style>
</head>

<body>

<h1>🛡️ Escudo Digital</h1>

<textarea id="mensagem" placeholder="Cole a mensagem aqui..."></textarea><br>

<button onclick="analisar()">🔍 Analisar</button>

<div class="barra">
  <div id="barra" class="progresso"></div>
</div>

<div id="resultado"></div>

<div class="divisor"></div>

<h3>💡 Não sabe como funciona um golpe? Veja na prática abaixo:</h3>

<button onclick="demo1()">🎁 Golpe de prêmio</button>
<button onclick="demo2()">⚠️ Urgência bancária</button>
<button onclick="demo3()">🌐 Fake news</button>
<button onclick="gerar()">🎲 Gerar golpe</button>

<script>

function analisar(){

let texto = document.getElementById("mensagem").value.toLowerCase();
texto = texto.normalize("NFD").replace(/[\u0300-\u036f]/g,"");

let score = 0;
let explicacao = [];
let tipo = "";
let estrategia = [];

// FUNÇÃO INTELIGENTE (evita falso positivo)
function detectar(palavra, contexto, pontos, nome){
  if(texto.includes(palavra)){
    if(!contexto || contexto.some(c=>texto.includes(c))){
      score += pontos;
      explicacao.push(nome + " → " + palavra);
    }
  }
}

// DETECÇÃO COM CONTEXTO
detectar("ganhe",["dinheiro","rapido","facil"],3,"Promessa");
detectar("premio",["ganhou","resgate","clique"],3,"Golpe de prêmio");
detectar("urgente",["agora","imediato","rapido"],2,"Urgência");
detectar("cpf",null,5,"Dados sensíveis");
detectar("senha",null,5,"Dados sensíveis");
detectar("link",["clique","acesse"],3,"Link suspeito");
detectar("midia",["esconde","censurado"],3,"Fake news");
detectar("compartilhe",["urgente","antes"],2,"Fake news");

// COMBINAÇÕES PODEROSAS
if(texto.includes("cpf") && texto.includes("link")){
  score += 6;
  tipo = "Phishing bancário";
}

if(texto.includes("premio") && texto.includes("ganhou")){
  score += 5;
  tipo = "Golpe de prêmio";
}

if(texto.includes("midia") && texto.includes("compartilhe")){
  score += 5;
  tipo = "Fake news";
}

if(texto.includes("urgente") && texto.includes("senha")){
  score += 6;
  tipo = "Engenharia social";
}

// ESTRATÉGIA
if(texto.includes("urgente")) estrategia.push("Pressão");
if(texto.includes("ganhe") || texto.includes("premio")) estrategia.push("Recompensa");
if(texto.includes("ajuda") || texto.includes("desesperado")) estrategia.push("Emoção");

// FALLBACK (nunca fica vazio)
if(tipo === ""){
  if(score >= 10) tipo = "Possível golpe digital";
  else tipo = "Baixo risco";
}

// SCORE INTELIGENTE
let risco = Math.min(score * 7, 100);

// CLASSIFICAÇÃO
let nivel="", cor="";

if(risco >= 70){nivel="🔴 Alto risco"; cor="red";}
else if(risco >= 40){nivel="🟡 Médio risco"; cor="yellow";}
else if(risco > 0){nivel="🟠 Baixo risco"; cor="orange";}
else{nivel="🟢 Seguro"; cor="green";}

// BARRA
document.getElementById("barra").style.width = risco + "%";
document.getElementById("barra").style.background = cor;

// DICAS
let dicas="";
if(risco >= 70){
dicas="❌ Não clique em links<br>❌ Não envie dados<br>✔ Procure canais oficiais";
}
else if(risco >= 40){
dicas="⚠️ Verifique a fonte antes de agir";
}
else{
dicas="✔ Mensagem aparentemente segura";
}

// RESULTADO FINAL
document.getElementById("resultado").innerHTML =
"<b>"+nivel+"</b><br><br>"+
"📊 Risco: "+risco+"%<br><br>"+
"🕵️ Tipo: "+tipo+"<br>"+
"🎭 Estratégia: "+(estrategia.join(" + ") || "Nenhuma") + "<br><br>"+
"🔎 Detecção:<br>"+explicacao.join("<br>")+"<br><br>"+
"💡 Essa mensagem apresenta padrões comuns de manipulação digital.<br><br>"+
"📌 Dicas:<br>"+dicas;

}

// DEMOS
function demo1(){
document.getElementById("mensagem").value =
"Parabéns! Você ganhou um prêmio exclusivo, clique no link agora e informe seu CPF!";
analisar();
}

function demo2(){
document.getElementById("mensagem").value =
"URGENTE! Sua conta será bloqueada, confirme sua senha agora!";
analisar();
}

function demo3(){
document.getElementById("mensagem").value =
"A mídia esconde isso, compartilhe antes que apaguem!";
analisar();
}

// GERADOR
function gerar(){
let exemplos=[
"URGENTE! Envie seu CPF agora para evitar bloqueio!",
"Você ganhou dinheiro rápido, clique no link!",
"A mídia censura isso, compartilhe já!",
"Confirme sua senha imediatamente!"
];
let r = exemplos[Math.floor(Math.random()*exemplos.length)];
document.getElementById("mensagem").value = r;
analisar();
}

</script>

</body>
</html>
